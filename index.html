<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIST RESELLER | UNDERCODE VOM</title></title>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --card-bg: #111111; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; padding: 40px 20px 50px; width: 100%; }
        .header h1 { color: var(--gold); font-size: 24px; letter-spacing: 4px; text-transform: uppercase; }
        .search-container { width: 85%; max-width: 320px; margin: -20px 0 35px; }
        #searchInput { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid var(--gold); border-radius: 50px; color: white; text-align: center; outline: none; }
        .reseller-list { width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 120px; }
        .reseller-card { background: var(--card-bg); border-left: 3px solid var(--gold); border-radius: 12px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .info h3 { margin: 0; font-size: 13px; text-transform: uppercase; }
        .info p { margin: 4px 0 0; font-size: 10px; color: #666; font-weight: bold; }
        .status-box { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .status-active { font-size: 8px; color: var(--gold); border: 1px solid var(--gold); padding: 1px 6px; border-radius: 4px; font-weight: bold; }
        .btn-wa { background: linear-gradient(45deg, #B8860B, #F9E29C); color: #000; text-decoration: none; padding: 7px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; }
        
        /* Music Player Style */
        #music-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(17,17,17,0.98); border: 1px solid var(--gold); padding: 10px 20px; border-radius: 50px; display: flex; align-items: center; gap: 15px; z-index: 9999; width: 260px; box-shadow: 0 0 20px rgba(212,175,55,0.4); }
        #playBtn { background: var(--gold); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onclick="firstClick()">

    <div class="header">
        <h1>TRUSTED SELLER VOM</h1>
        <p style="font-size: 9px; color: #666; letter-spacing: 2px;">VOM UNDERC0DE DATABASE</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="searchReseller()" placeholder="Cari Nama Reseller...">
    </div>

    <div class="reseller-list" id="resellerList">
        <!-- Contoh 3 Reseller (Anda boleh tambah lagi ikut format sama) -->
        <div class="reseller-card"><div class="info"><h3>AlipOfficialMy</h3><p>#VOM_00 • LEADER</p></div><div class="status-box"><span class="status-active">ACTIVE</span><a href="https://wa.me/601130694931" class="btn-wa">WHATSAPP</a></div></div>
        <div class="reseller-card"><div class="info"><h3>ZyroOfficialMy</h3><p>#VOM_04 • ASSISTANT</p></div><div class="status-box"><span class="status-active">ACTIVE</span><a href="https://wa.me/60177220301" class="btn-wa">WHATSAPP</a></div></div>
        <div class="reseller-card"><div class="info"><h3>RillzzOfficialMy</h3><p>#VOM_01 • MEMBER</p></div><div class="status-box"><span class="status-active">ACTIVE</span><a href="https://wa.me/60182092362" class="btn-wa">WHATSAPP</a></div></div>
    </div>

    <!-- Music Player UI -->
    <div id="music-container">
        <div style="flex: 1; text-align: center;">
            <div style="color: var(--gold); font-size: 10px; font-weight: bold; letter-spacing: 1px;">VOM OFFICIAL BGM</div>
            <div id="mStatus" style="color: #666; font-size: 8px;">TAP ANYWHERE TO PLAY</div>
        </div>
        <button id="playBtn" onclick="toggleM()">▶</button>
    </div>

    <!-- Hidden Video Player (For Audio) -->
    <video id="bgM" loop style="display:none;">
        <source src="https://files.catbox.moe/o6t529.mp4" type="video/mp4">
    </video>

    <script>
        const v = document.getElementById('bgM');
        const b = document.getElementById('playBtn');
        const s = document.getElementById('mStatus');

        function toggleM() {
            if (v.paused) {
                v.play();
                b.innerText = "⏸";
                s.innerText = "NOW PLAYING";
            } else {
                v.pause();
                b.innerText = "▶";
                s.innerText = "PAUSED";
            }
        }

        // Auto-play trigger bila user klik mana-mana dlm web
        function firstClick() {
            if (v.paused && s.innerText === "TAP ANYWHERE TO PLAY") {
                toggleM();
            }
        }

        function searchReseller() {
            let input = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.getElementsByClassName('reseller-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getElementsByTagName('h3')[0].innerText;
                cards[i].style.display = name.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    </script>
</body>
</html>
