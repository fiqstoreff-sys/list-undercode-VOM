<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOM | INFINITY SYSTEM</title>
    <style>
        :root {
            --main-blue: #00d2ff;
            --deep-blue: #0a192f;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 0;
            background: #02050a;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center;
        }

        /* Gojo Aura Background */
        .aura-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a192f 0%, #02050a 100%);
            z-index: -2;
        }

        .blue-glow {
            position: fixed; top: -10%; right: -10%; width: 400px; height: 400px;
            background: var(--main-blue); filter: blur(150px); opacity: 0.15; z-index: -1;
        }

        .container {
            width: 100%; max-width: 480px; padding: 40px 20px;
        }

        .main-title {
            text-align: center; margin-bottom: 40px;
        }

        .main-title h1 {
            font-size: 32px; font-weight: 900; letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, var(--main-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* Modern Search */
        .search-box {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px; padding: 5px 15px;
            display: flex; align-items: center; margin-bottom: 30px;
        }

        .search-box input {
            background: transparent; border: none; color: white;
            padding: 12px; width: 100%; outline: none; font-size: 14px;
        }

        /* Crystal Cards */
        .reseller-grid { display: flex; flex-direction: column; gap: 15px; }

        .card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: scale(1.03);
            border-color: var(--main-blue);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.15);
        }

        .res-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; display: block; }
        .res-id { font-size: 11px; color: var(--main-blue); letter-spacing: 1px; font-weight: 600; }

        .wa-link {
            width: 45px; height: 45px;
            background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .wa-link:hover { background: var(--main-blue); }

        .wa-link svg { fill: #000; width: 20px; }

        .footer { text-align: center; margin-top: 50px; font-size: 11px; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="aura-bg"></div>
    <div class="blue-glow"></div>

    <div class="container">
        <div class="main-title">
            <p style="color: var(--main-blue); font-size: 12px; font-weight: 700; margin-bottom: 5px;">VOM UNDERC0DE</p>
            <h1>INFINITY LIST</h1>
        </div>

        <div class="search-box">
            <input type="text" id="find" onkeyup="filter()" placeholder="Search authorized reseller...">
        </div>

        <div class="reseller-grid" id="list">
            
            <!-- Card 1 -->
            <div class="card">
                <div>
                    <span class="res-name">ALIPOFFICIALMY</span>
                    <span class="res-id">OWNER • VOM-000</span>
                </div>
                <a href="https://wa.me/601133407753" class="wa-link">
                    <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.246 2.248 3.484 5.232 3.484 8.412s-1.238 6.164-3.484 8.412c-2.246 2.248-5.232 3.487-8.413 3.487-2.015 0-3.991-.51-5.757-1.474l-6.736 1.675zm5.851-4.823c1.562.928 3.178 1.417 4.843 1.417 5.104 0 9.258-4.155 9.258-9.26s-4.154-9.259-9.258-9.259c-5.106 0-9.261 4.155-9.261 9.259 0 1.742.483 3.442 1.397 4.917l-.984 3.595 3.69-.916z"/></svg>
                </a>
            </div>

            <!-- Anda boleh copy card di atas untuk reseller lain -->

        </div>

        <div class="footer">
            "Don't worry, I'm the strongest."<br>
            SECURED BY VOM SYSTEM 2026
        </div>
    </div>

    <script>
        function filter() {
            let val = document.getElementById('find').value.toUpperCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let txt = cards[i].innerText;
                cards[i].style.display = txt.toUpperCase().indexOf(val) > -1 ? "" : "none";
            }
        }
    </script>

</body>
</html>
