<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIST RESELLER | UNDERCODE VOM</title>
    <style>
        :root {
            --glow: #00d2ff;
            --bg: rgba(2, 5, 10, 0.7); /* Background hitam separa telus */
            --card: rgba(10, 25, 47, 0.85);
            --whatsapp: #25d366;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow-x: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* Video Background Styling */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .video-background iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 ratio */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 ratio */
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            filter: brightness(0.4) grayscale(0.3); /* Biar video tak terlalu terang */
        }

        .overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; min-height: 100%;
            background: radial-gradient(circle, transparent 20%, var(--bg) 100%);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; box-sizing: border-box;
        }

        .header h1 {
            font-size: 28px; letter-spacing: 4px; color: var(--glow);
            text-shadow: 0 0 20px var(--glow); margin: 10px 0;
            text-align: center;
        }

        /* Search Bar */
        .search-container { width: 100%; max-width: 450px; margin-bottom: 20px; }
        #searchInput {
            width: 100%; padding: 12px 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glow);
            border-radius: 30px; color: white;
            box-sizing: border-box; outline: none;
            backdrop-filter: blur(5px);
        }

        /* Reseller List Scrollable */
        .reseller-list {
            width: 100%; max-width: 450px;
            display: flex; flex-direction: column; gap: 12px;
            padding-bottom: 50px;
        }

        .reseller-card {
            background: var(--card);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 15px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .reseller-card:hover {
            border-color: var(--glow);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            transform: translateY(-3px);
        }

        .info h3 { margin: 0; font-size: 14px; letter-spacing: 1px; }
        .info p { margin: 2px 0 0; font-size: 11px; color: var(--glow); }

        .btn-wa {
            background: var(--whatsapp);
            color: white; text-decoration: none;
            padding: 8px 15px; border-radius: 8px;
            font-size: 11px; font-weight: bold;
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.3);
        }

        .status-tag {
            font-size: 9px; padding: 2px 6px;
            border-radius: 4px; background: rgba(0, 255, 0, 0.2);
            color: #00ff00; border: 1px solid #00ff00;
            margin-bottom: 5px; display: inline-block;
        }
    </style>
</head>
<body>

    <!-- Video Background (YouTube Gojo Live Wallpaper) -->
    <div class="video-background">
        <iframe src="https://youtu.be/aMTXY75ywL0?si=evBm9DotgCi16BTv" frameborder="0" allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="overlay">
        <div class="header">
            <h1>VOM UNDERC0DE</h1>
            <p style="text-align:center; font-size: 10px; letter-spacing: 2px; opacity: 0.8;">AUTHORISED RESELLER LIST</p>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="searchReseller()" placeholder="Cari Reseller Terpercaya...">
        </div>

        <div class="reseller-list" id="resellerList">
            
            <!-- RESELLER 1 (OWNER) -->
            <div class="reseller-card">
                <div class="info">
                    <span class="status-tag">OWNER</span>
                    <h3>AlipofficialMy</h3>
                    <p>ID: VOM-000</p>
                </div>
                <a href="https://wa.me/601133407753" class="btn-wa">WHATSAPP</a>
            </div>

            <!-- Anda boleh copy-paste kod Reseller Card di bawah ini sebanyak 30 kali -->
            <div class="reseller-card">
                <div class="info">
                    <span class="status-tag">ACTIVE</span>
                    <h3>NAMA RESELLER 2</h3>
                    <p>ID: VOM-002</p>
                </div>
                <a href="https://wa.me/601XXXXXXXXX" class="btn-wa">WHATSAPP</a>
            </div>

            <!-- Tambah lagi di bawah sini... -->

        </div>

        <p style="font-size: 10px; opacity: 0.5; margin: 30px 0;">"Imaginary Technique: Hollow Purple" — Gojo Satoru</p>
    </div>

    <script>
        function searchReseller() {
            let input = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.getElementsByClassName('reseller-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getElementsByTagName('h3')[0];
                if (name.innerHTML.toUpperCase().indexOf(input) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>

</body>
    </html>
