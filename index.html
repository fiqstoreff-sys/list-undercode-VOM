<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIST RESELLER | UNDERCODE VOM</title>
    <style>
        :root {
            --gold: #D4AF37;
            --bg: #050505;
            --card-bg: #111111;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        .header {
            text-align: center;
            padding: 40px 20px 50px;
            background: linear-gradient(to bottom, #1a1a1a, var(--bg));
            width: 100%;
        }

        .header h1 {
            color: var(--gold);
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
        }

        /* SEARCH BAR DIPENDEKKAN */
        .search-container {
            width: 85%;
            max-width: 320px;
            margin: -20px 0 35px;
        }

        #searchInput {
            width: 100%; 
            padding: 10px 20px;
            background: rgba(26, 26, 26, 0.9);
            border: 1px solid var(--gold);
            border-radius: 50px;
            color: white;
            outline: none;
            font-size: 13px;
            text-align: center;
            box-sizing: border-box;
        }

        .reseller-list {
            width: 90%; max-width: 450px;
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 50px;
        }

        .reseller-card {
            background: var(--card-bg);
            border-left: 3px solid var(--gold);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .info h3 { margin: 0; font-size: 14px; text-transform: uppercase; }
        .info p { margin: 4px 0 0; font-size: 10px; color: #666; }

        .status-box { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }

        .status-active {
            font-size: 8px; color: var(--gold);
            border: 1px solid var(--gold);
            padding: 1px 6px; border-radius: 4px; font-weight: bold;
        }

        .btn-wa {
            background: linear-gradient(45deg, #B8860B, #F9E29C);
            color: #000; text-decoration: none;
            padding: 8px 12px; border-radius: 6px;
            font-size: 11px; font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>TRUSTED SELLER VOM</h1>
        <p style="font-size: 9px; color: #666; letter-spacing: 2px;">AUTHORISED RESELLER DATABASE</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="searchReseller()" placeholder="Cari Nama Reseller...">
    </div>

    <div class="reseller-list" id="resellerList">
        <div class="reseller-card">
            <div class="info">
                <h3>ALIPOFFICIALMY</h3>
                <p>ID: VOM-000 • OWNER</p>
            </div>
            <div class="status-box">
                <span class="status-active">ACTIVE</span>
                <a href="https://wa.me/601133407753" class="btn-wa">WHATSAPP</a>
            </div>
        </div>
        <!-- Tambah slot lain di sini -->
    </div>

    <script>
        function searchReseller() {
            let input = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.getElementsByClassName('reseller-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getElementsByTagName('h3')[0];
                if (name.innerHTML.toUpperCase().indexOf(input) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
